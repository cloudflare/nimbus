name: Templates

# Replaces the old pack-smoke (MONO-4). Guards against a generation-breaking
# edit to the canonical source, the generator, or the scaffolder — the kind
# that would otherwise only surface at release time. Scoped to the paths that
# can actually break generation so unrelated PRs skip it.
on:
  push:
    branches: [main]
    paths:
      - "packages/nimbus-starter-source/**"
      - "packages/create-nimbus-docs/**"
      - "packages/nimbus-docs/**"
      - "scripts/templates-check.mjs"
  pull_request:
    branches: [main]
    paths:
      - "packages/nimbus-starter-source/**"
      - "packages/create-nimbus-docs/**"
      - "packages/nimbus-docs/**"
      - "scripts/templates-check.mjs"

permissions:
  contents: read

jobs:
  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate, scaffold, and build a template
        run: node scripts/templates-check.mjs
